{{define "content"}}
<article>
  <div class="article-header">
    <h1>{{.Title}}</h1>
    {{if .Date}}
    <p class="meta">
      <span>{{.Date}}</span>
      {{if .Tags}}{{range .Tags}}<span class="tag">{{.}}</span>{{end}}{{end}}
    </p>
    {{end}}
  </div>
  <div class="prose">
    {{.Body}}
  </div>
</article>
{{end}}
