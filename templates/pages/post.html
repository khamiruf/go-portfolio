{{define "content"}}
<article>
  <div class="article-header">
    <h1>{{.Title}}</h1>
    <p class="meta">
      {{if .Date}}<span>{{.Date}}</span>{{end}}
      {{if .WordCount}}<span>{{.WordCount}} words</span><span>{{.ReadTime}} min read</span>{{end}}
      {{if .Tags}}{{range .Tags}}<span class="tag">{{.}}</span>{{end}}{{end}}
    </p>
  </div>
  <div class="prose" id="post-body">
    {{.Body}}
  </div>
</article>
{{end}}
